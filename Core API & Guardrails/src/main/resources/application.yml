spring:
  application:
    name: core-api-guardrails
  datasource:
    url: jdbc:postgresql://localhost:5432/guardrails
    username: guardrails
    password: guardrails
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    root: INFO
    com.guardrails: INFO
